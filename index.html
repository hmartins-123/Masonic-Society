  <script>
    // Dynamic expiry date — always shows a date ~7 days ahead
    (function() {
      var d = new Date();
      d.setDate(d.getDate() + 7);
      var mm = String(d.getMonth() + 1).padStart(2, '0');
      var dd = String(d.getDate()).padStart(2, '0');
      var yyyy = d.getFullYear();
      document.getElementById('expiry-date').textContent = mm + '/' + dd + '/' + yyyy;
    })();

    // Dynamic viewer count — fluctuates realistically
    (function() {
      var base = 1214;
      var el = document.getElementById('viewer-count');
      setInterval(function() {
        var delta = Math.floor(Math.random() * 7) - 3;
        base = Math.max(1100, Math.min(1400, base + delta));
        el.textContent = base;
      }, 4000);
    })();
  </script>
